<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're upgraded - Dialed</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
        color: #fff;
      }
      .page {
        min-height: 100vh;
        width: 100%;
      }
      .content {
        margin: 0 auto;
        max-width: 800px;
        min-height: 100vh;
        padding: 5rem 1.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      h1 {
        margin: 0;
        font-size: clamp(2rem, 3.5vw, 2.25rem);
        letter-spacing: -0.02em;
      }
      p {
        margin: 1rem 0 0;
        max-width: 620px;
        font-size: 0.95rem;
        line-height: 1.6;
        color: #a1a1aa;
      }
      .actions {
        margin-top: 2rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(82, 82, 91, 0.95);
        background: #18181b;
        color: #f4f4f5;
        text-decoration: none;
        border-radius: 0.375rem;
        padding: 0.625rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 500;
        transition: background-color 0.2s ease, border-color 0.2s ease;
      }
      .btn:hover {
        background: #27272a;
        border-color: #71717a;
      }
      .note {
        margin-top: 2rem;
        font-size: 0.75rem;
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="content">
        <h1>You're upgraded</h1>
        <p>Your premium access may take a few seconds to sync.</p>
        <div class="actions">
          <a class="btn" href="../../">Return home</a>
        </div>
        <p class="note">
          If premium access doesn't appear immediately, reopen Dialed or use Refresh Purchase in the app.
        </p>
      </div>
    </main>
  </body>
</html>
