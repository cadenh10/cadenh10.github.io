<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dialed | Reset Password</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #a1a1aa;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      p {
        margin: 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <p>Opening password reset…</p>
    <script>
      (function redirectToSpa() {
        var target = "/?redirect=" + encodeURIComponent("/auth/reset-password");
        if (window.location.hash) target += window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
